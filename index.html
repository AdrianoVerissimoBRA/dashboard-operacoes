<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Logístico Executivo</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-geo@4.3.0/build/index.umd.min.js"></script>

<style>
:root{
  --bg:#0a0e17;
  --card:#111827;
  --border:#1e293b;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Segoe UI, sans-serif;
}

/* HEADER */
.header{
  padding:15px 25px;
  border-bottom:1px solid var(--border);
  font-weight:800;
  letter-spacing:1px;
}

/* GRID */
.container{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:15px;
}

.card h2{
  font-size:14px;
  margin-bottom:10px;
  color:var(--muted);
}

/* KPI */
.kpi{
  font-size:28px;
  font-weight:900;
}

.sub{
  font-size:12px;
  color:var(--muted);
}

/* MAP */
canvas{
  width:100% !important;
  height:420px !important;
}

.gradient{
  height:8px;
  border-radius:6px;
  background:linear-gradient(to right, #22c55e, #facc15, #ef4444);
  margin-top:8px;
}

.legend{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--muted);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

td,th{
  padding:6px;
  border-bottom:1px solid var(--border);
}

th{
  text-align:left;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="header">
📊 DASHBOARD LOGÍSTICO EXECUTIVO
</div>

<div class="container">

<!-- KPIs -->
<div class="grid">

<div class="card">
  <h2>💰 Custo Médio</h2>
  <div class="kpi">R$ 12,30</div>
  <div class="sub">Base últimos envios</div>
</div>

<div class="card">
  <h2>⏱ SLA Médio</h2>
  <div class="kpi">3,2 dias</div>
  <div class="sub">Tempo médio de entrega</div>
</div>

<div class="card">
  <h2>📦 Volume</h2>
  <div class="kpi">18.240</div>
  <div class="sub">Pedidos no período</div>
</div>

</div>

<!-- MAPAS -->
<div class="grid" style="margin-top:20px">

<div class="card">
  <h2>💰 Mapa de Preço</h2>
  <canvas id="mapPreco"></canvas>
  <div class="gradient"></div>
  <div class="legend">
    <span>Barato</span>
    <span>Caro</span>
  </div>
</div>

<div class="card">
  <h2>⏱ Mapa de SLA</h2>
  <canvas id="mapSLA"></canvas>
  <div class="gradient"></div>
  <div class="legend">
    <span>Rápido</span>
    <span>Lento</span>
  </div>
</div>

</div>

<!-- TABELA -->
<div class="card" style="margin-top:20px">
  <h2>📊 Comparativo por Estado</h2>
  <table>
    <thead>
      <tr>
        <th>UF</th>
        <th>Preço</th>
        <th>SLA</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

</div>

<script>
async function init(){

  const geo = await fetch('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/brazil-states.geojson')
    .then(r=>r.json());

  const states = geo.features;

  // 🔥 DADOS (PLUGAR VTEX AQUI DEPOIS)
  const preco = {
    SP:12.19, RJ:12.42, MG:11.60, GO:11.70,
    PE:13.14, BA:13.00, RS:14.00, PR:11.80
  };

  const sla = {
    SP:2, RJ:3, MG:2, GO:3,
    PE:5, BA:4, RS:6, PR:2
  };

  // COLOR SCALE
  function color(v,min,max){
    const r=(v-min)/(max-min);
    return r<0.5
      ? `rgb(${255*r*2},200,0)`
      : `rgb(255,${200-(r-0.5)*2*200},0)`;
  }

  function dataset(data){
    const vals=Object.values(data);
    const min=Math.min(...vals);
    const max=Math.max(...vals);

    return states.map(f=>{
      const uf=f.properties.sigla;
      const v=data[uf];

      return {
        feature:f,
        value:v,
        backgroundColor:v?color(v,min,max):'#1e293b'
      };
    });
  }

  // MAP PREÇO
  new Chart(document.getElementById("mapPreco"),{
    type:'choropleth',
    data:{
      labels:states.map(s=>s.properties.name),
      datasets:[{data:dataset(preco)}]
    },
    options:{
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:ctx=>ctx.raw.value ? "R$ "+ctx.raw.value : "Sem dado"
          }
        }
      }
    }
  });

  // MAP SLA
  new Chart(document.getElementById("mapSLA"),{
    type:'choropleth',
    data:{
      labels:states.map(s=>s.properties.name),
      datasets:[{data:dataset(sla)}]
    },
    options:{
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:ctx=>ctx.raw.value ? ctx.raw.value+" dias" : "Sem dado"
          }
        }
      }
    }
  });

  // TABELA
  const tbody=document.getElementById("tabela");
  Object.keys(preco).forEach(uf=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${uf}</td>
      <td>R$ ${preco[uf]}</td>
      <td>${sla[uf]} dias</td>
    `;
    tbody.appendChild(tr);
  });

}

init();
</script>

</body>
</html>
